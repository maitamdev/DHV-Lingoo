<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f9ff"/>
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#06b6d4" flood-opacity="0.15"/>
    </filter>
    <filter id="shadow2" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3b82f6" flood-opacity="0.12"/>
    </filter>
    <filter id="shadow3" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background decorative circles -->
  <circle cx="480" cy="80" r="60" fill="#06b6d4" opacity="0.06"/>
  <circle cx="520" cy="400" r="45" fill="#3b82f6" opacity="0.06"/>
  <circle cx="80" cy="420" r="35" fill="#14b8a6" opacity="0.08"/>
  <circle cx="150" cy="60" r="25" fill="#8b5cf6" opacity="0.06"/>

  <!-- Main phone/tablet mockup -->
  <g filter="url(#shadow1)">
    <rect x="160" y="40" width="280" height="380" rx="28" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <!-- Screen area -->
    <rect x="172" y="70" width="256" height="320" rx="8" fill="url(#grad1)"/>
    
    <!-- App header bar -->
    <rect x="172" y="70" width="256" height="48" rx="8" fill="white" opacity="0.95"/>
    <circle cx="196" cy="94" r="14" fill="url(#grad2)"/>
    <text x="200" y="98" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">L</text>
    <text x="222" y="98" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">DHV-Lingoo</text>
    <rect x="380" y="84" width="36" height="20" rx="10" fill="url(#grad2)"/>
    <text x="398" y="97" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">Pro</text>
    
    <!-- Progress section -->
    <rect x="184" y="130" width="232" height="70" rx="12" fill="white" filter="url(#shadow3)"/>
    <text x="198" y="150" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#475569">Tiến trình hôm nay</text>
    <!-- Progress bar background -->
    <rect x="198" y="158" width="200" height="8" rx="4" fill="#e2e8f0"/>
    <!-- Progress bar fill -->
    <rect x="198" y="158" width="140" height="8" rx="4" fill="url(#grad2)"/>
    <text x="198" y="182" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#06b6d4">70%</text>
    <text x="230" y="182" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">hoàn thành</text>
    
    <!-- Stats row -->
    <g transform="translate(184, 212)">
      <!-- XP Card -->
      <rect width="70" height="56" rx="10" fill="white" filter="url(#shadow3)"/>
      <text x="35" y="22" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">🔥 XP</text>
      <text x="35" y="40" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b" text-anchor="middle">256</text>
      
      <!-- Streak Card -->
      <rect x="80" width="70" height="56" rx="10" fill="white" filter="url(#shadow3)"/>
      <text x="115" y="22" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">⚡ Streak</text>
      <text x="115" y="40" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ef4444" text-anchor="middle">12</text>
      
      <!-- Level Card -->
      <rect x="160" width="72" height="56" rx="10" fill="white" filter="url(#shadow3)"/>
      <text x="196" y="22" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">📚 Level</text>
      <text x="196" y="40" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#06b6d4" text-anchor="middle">A2</text>
    </g>
    
    <!-- Lesson card -->
    <rect x="184" y="282" width="232" height="60" rx="12" fill="white" filter="url(#shadow3)"/>
    <rect x="196" y="294" width="36" height="36" rx="8" fill="url(#grad3)" opacity="0.9"/>
    <text x="214" y="317" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">📖</text>
    <text x="244" y="310" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Bài 5: Greetings</text>
    <text x="244" y="326" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">A1 · Vỡ lòng · 10 phút</text>
    <rect x="374" y="302" width="30" height="22" rx="11" fill="url(#grad2)"/>
    <text x="389" y="317" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">▸</text>
    
    <!-- Phone notch -->
    <rect x="260" y="45" width="80" height="20" rx="10" fill="#1e293b"/>
  </g>

  <!-- Floating card: Quiz result (top-right) -->
  <g filter="url(#shadow2)" transform="translate(420, 60)">
    <rect width="140" height="100" rx="16" fill="white"/>
    <rect x="12" y="14" width="116" height="3" rx="1.5" fill="#e2e8f0"/>
    <rect x="12" y="14" width="93" height="3" rx="1.5" fill="url(#grad2)"/>
    <text x="70" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#grad2)" text-anchor="middle">9/10</text>
    <text x="70" y="58" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Trắc nghiệm</text>
    <text x="70" y="82" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">🎉</text>
  </g>

  <!-- Floating card: Vocab (bottom-left) -->
  <g filter="url(#shadow2)" transform="translate(40, 260)">
    <rect width="130" height="110" rx="16" fill="white"/>
    <rect x="14" y="14" width="44" height="44" rx="10" fill="url(#grad3)" opacity="0.12"/>
    <text x="36" y="44" font-family="Arial, sans-serif" font-size="22" text-anchor="middle">🗣️</text>
    <text x="70" y="80" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle">Hello!</text>
    <text x="70" y="96" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Xin chào · /həˈloʊ/</text>
  </g>

  <!-- Floating card: Streak badge (top-left) -->
  <g filter="url(#shadow2)" transform="translate(60, 80)">
    <rect width="110" height="68" rx="14" fill="white"/>
    <text x="22" y="40" font-family="Arial, sans-serif" font-size="24">🔥</text>
    <text x="52" y="34" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#475569">12 ngày</text>
    <text x="52" y="50" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">streak liên tục</text>
  </g>

  <!-- Floating card: Achievement (bottom-right) -->
  <g filter="url(#shadow2)" transform="translate(440, 350)">
    <rect width="130" height="80" rx="14" fill="white"/>
    <circle cx="36" cy="40" r="18" fill="url(#grad4)" opacity="0.12"/>
    <text x="36" y="46" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">🏆</text>
    <text x="82" y="34" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#1e293b">Top 5%</text>
    <text x="82" y="48" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">bảng xếp hạng</text>
    <rect x="64" y="58" width="50" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="64" y="58" width="45" height="4" rx="2" fill="url(#grad4)"/>
  </g>

  <!-- Decorative dots pattern -->
  <g fill="#06b6d4" opacity="0.12">
    <circle cx="540" cy="200" r="3"/>
    <circle cx="555" cy="200" r="3"/>
    <circle cx="570" cy="200" r="3"/>
    <circle cx="540" cy="215" r="3"/>
    <circle cx="555" cy="215" r="3"/>
    <circle cx="570" cy="215" r="3"/>
    <circle cx="540" cy="230" r="3"/>
    <circle cx="555" cy="230" r="3"/>
    <circle cx="570" cy="230" r="3"/>
  </g>
  
  <g fill="#8b5cf6" opacity="0.1">
    <circle cx="30" cy="160" r="2.5"/>
    <circle cx="42" cy="160" r="2.5"/>
    <circle cx="54" cy="160" r="2.5"/>
    <circle cx="30" cy="172" r="2.5"/>
    <circle cx="42" cy="172" r="2.5"/>
    <circle cx="54" cy="172" r="2.5"/>
    <circle cx="30" cy="184" r="2.5"/>
    <circle cx="42" cy="184" r="2.5"/>
    <circle cx="54" cy="184" r="2.5"/>
  </g>

  <!-- Sparkle decorations -->
  <g fill="#f59e0b" opacity="0.6">
    <path d="M510 140 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3z"/>
    <path d="M100 380 l2 6 6 2 -6 2 -2 6 -2 -6 -6 -2 6 -2z"/>
    <path d="M530 310 l2 5 5 2 -5 2 -2 5 -2 -5 -5 -2 5 -2z"/>
  </g>
</svg>
