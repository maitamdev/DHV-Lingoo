  <rect x="636" y="210" width="130" height="52" rx="6" fill="#faf5ff"/>
  <text x="646" y="232" font-family="Arial,sans-serif" font-size="11" fill="#7c3aed" font-weight="bold">Paraphrase</text>
  <text x="646" y="248" font-family="Arial,sans-serif" font-size="9" fill="#a78bfa">to express the same...</text>
  <rect x="636" y="272" width="130" height="52" rx="6" fill="#faf5ff"/>
  <text x="646" y="294" font-family="Arial,sans-serif" font-size="11" fill="#7c3aed" font-weight="bold">Assertion</text>
  <text x="646" y="310" font-family="Arial,sans-serif" font-size="9" fill="#a78bfa">a confident statement...</text>
  <rect x="636" y="334" width="130" height="52" rx="6" fill="#faf5ff"/>
  <text x="646" y="356" font-family="Arial,sans-serif" font-size="11" fill="#7c3aed" font-weight="bold">Elaborate</text>
  <text x="646" y="372" font-family="Arial,sans-serif" font-size="9" fill="#a78bfa">to explain in detail...</text>
  <rect x="636" y="400" width="130" height="36" rx="6" fill="#7c3aed"/>
  <text x="668" y="422" font-family="Arial,sans-serif" font-size="11" fill="white" font-weight="bold">Add to Deck</text>
