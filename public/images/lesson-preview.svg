  <text x="572" y="138" font-family="Arial,sans-serif" font-size="11" fill="#7c3aed" font-weight="bold">60%</text>
  <!-- Content area -->
  <rect x="224" y="164" width="380" height="320" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="244" y="194" font-family="Arial,sans-serif" font-size="14" fill="#1e293b" font-weight="bold">Introduction Structure</text>
  <!-- Lesson content blocks -->
  <rect x="244" y="208" width="340" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="244" y="220" width="300" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="244" y="232" width="320" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="244" y="252" width="340" height="56" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="264" y="272" font-family="Arial,sans-serif" font-size="11" fill="#166534" font-weight="bold">💡 Key Tip</text>
  <text x="264" y="290" font-family="Arial,sans-serif" font-size="10" fill="#15803d">Start with a paraphrase of the question...</text>
  <!-- Example answer block -->
  <rect x="244" y="320" width="340" height="80" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="264" y="344" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" font-weight="bold">📝 Example</text>
  <rect x="264" y="354" width="280" height="4" rx="2" fill="#93c5fd" opacity="0.5"/>
  <rect x="264" y="366" width="260" height="4" rx="2" fill="#93c5fd" opacity="0.4"/>
  <rect x="264" y="378" width="240" height="4" rx="2" fill="#93c5fd" opacity="0.3"/>
  <!-- Navigation buttons -->
  <rect x="244" y="418" width="100" height="36" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="270" y="441" font-family="Arial,sans-serif" font-size="12" fill="#64748b">← Previous</text>
  <rect x="484" y="418" width="100" height="36" rx="8" fill="#7c3aed"/>
  <text x="518" y="441" font-family="Arial,sans-serif" font-size="12" fill="white">Next →</text>
