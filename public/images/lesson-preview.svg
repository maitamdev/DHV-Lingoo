      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Window frame -->
  <rect width="800" height="500" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <!-- Title bar -->
  <rect width="800" height="36" rx="12" fill="#f1f5f9"/>
  <rect y="12" width="800" height="24" fill="#f1f5f9"/>
  <circle cx="20" cy="18" r="6" fill="#ef4444"/>
  <circle cx="40" cy="18" r="6" fill="#f59e0b"/>
  <circle cx="60" cy="18" r="6" fill="#22c55e"/>
  <!-- Sidebar -->
  <rect y="36" width="200" height="464" fill="url(#side-bg)"/>
  <rect x="166" y="449" width="34" height="51" fill="url(#side-bg)"/>
  <text x="24" y="72" font-family="Arial,sans-serif" font-size="16" fill="white" font-weight="bold">DHVLingoo</text>
  <!-- breadcrumb -->
  <text x="224" y="64" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">IELTS Writing → Lesson 3</text>
  <!-- Lesson header -->
  <text x="224" y="96" font-family="Arial,sans-serif" font-size="20" fill="#1e293b" font-weight="bold">Task 2: Opinion Essay</text>
  <rect x="224" y="106" width="80" height="22" rx="11" fill="#ddd6fe"/>
  <text x="240" y="121" font-family="Arial,sans-serif" font-size="11" fill="#7c3aed" font-weight="600">Writing</text>
  <rect x="312" y="106" width="100" height="22" rx="11" fill="#ccfbf1"/>
  <text x="324" y="121" font-family="Arial,sans-serif" font-size="11" fill="#0d9488" font-weight="600">Intermediate</text>
  <!-- Progress bar -->
  <rect x="224" y="140" width="558" height="8" rx="4" fill="#e2e8f0"/>
