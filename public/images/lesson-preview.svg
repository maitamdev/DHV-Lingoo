  <rect x="620" y="164" width="162" height="320" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="636" y="194" font-family="Arial,sans-serif" font-size="13" fill="#1e293b" font-weight="bold">Vocabulary</text>
